services:
  postgres:
    image: postgres:16
    container_name: vidyaconnect-postgres-local
    environment:
      POSTGRES_USER: vidyaconnect
      POSTGRES_PASSWORD: vidyaconnect
      POSTGRES_DB: vidyaconnect_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: