version: '3.8'

# ─────────────────────────────────────────
# VidyaConnect - Local Development Environment
# Run with: docker compose -f infra/docker/docker-compose.local.yml up
# ─────────────────────────────────────────

services:

  # ── PostgreSQL Database ──────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vidyaconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vidyaconnect}
      POSTGRES_USER: ${POSTGRES_USER:-vidyaconnect_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidyaconnect_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vidyaconnect-network

  # ── Keycloak (Authentication) ────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: vidyaconnect-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-vidyaconnect}
      KC_DB_USERNAME: ${POSTGRES_USER:-vidyaconnect_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vidyaconnect-network

  # ── Nginx (Reverse Proxy) ────────────────
  nginx:
    image: nginx:alpine
    container_name: vidyaconnect-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - keycloak
    networks:
      - vidyaconnect-network

  # ── LocalStack (Fake AWS S3 locally) ─────
  localstack:
    image: localstack/localstack:3.4
    container_name: vidyaconnect-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-southeast-1
      LOCALSTACK_HOST: localstack
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - vidyaconnect-network

  # ── Backend API (Placeholder) ────────────
  backend:
    image: node:20-alpine
    container_name: vidyaconnect-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "echo 'Backend placeholder running' && sleep infinity"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-vidyaconnect_user}:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/${POSTGRES_DB:-vidyaconnect}
      KEYCLOAK_URL: http://keycloak:8080
      AWS_ENDPOINT: http://localstack:4566
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vidyaconnect-network

  # ── Web Admin Portal (Placeholder) ───────
  web-admin:
    image: node:20-alpine
    container_name: vidyaconnect-web-admin
    restart: unless-stopped
    working_dir: /app
    command: sh -c "echo 'Web admin placeholder running' && sleep infinity"
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - vidyaconnect-network

# ── Volumes (persistent data storage) ───────
volumes:
  postgres_data:
  localstack_data:

# ── Network (all containers talk to each other) ──
networks:
  vidyaconnect-network:
    driver: bridge
